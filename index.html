<style>

  .big{font-size:30px;font-weight:bold;font-family:Arial;color:var(--smu-red)}

  .section>h2{font-size:18px;color:var(--smu-red);padding-bottom:8px;border-bottom:3px solid var(--smu-red);margin-bottom:16px}

/* ---------- Time description coaching (Writing Good Time Descriptions) ---------- */
const ACTION_VERBS=["Drafted","Reviewed","Researched","Analyzed","Prepared","Attended","Summarized","Compiled","Revised","Examined","Observed","Investigated","Outlined","Presented","Interviewed","Updated","Assessed","Evaluated","Participated"];
const BANNED=[
 {re:/\brevis(e|ed|ing)\b|\bedit(ed|ing)?\b/i, msg:"Avoid “revise”/“edit” — describe the substantive work instead (e.g., “Incorporated comments on indemnification provisions in vendor agreement”)."},
 {re:/\bconfer(red)?\s+with\b/i, msg:"Avoid “conferred with” — state who you met and the purpose (e.g., “Attended weekly check-in with supervising counsel regarding data-privacy matter”)."},
 {re:/\bworked on\b|\bstuff\b|\bvarious\b|\bmisc\b|\bthings\b|\betc\.?\b/i, msg:"Vague phrasing detected — be specific about the task, subject matter, and work product."},
 {re:/\bemail(s|ed)?\b(?!.*(regarding|re:|about|concerning))/i, msg:"If referencing correspondence, state the subject (e.g., “Drafted email to compliance team regarding records-retention question”)."}
];
function coach(desc,hours){
  const issues=[];
  const d=(desc||"").trim();
  if(!d) return {issues:["Enter a description of the work performed."],ok:false};
  const first=d.split(/\s+/)[0];
  if(!/^[A-Z]/.test(first)) issues.push("Begin with a capitalized action verb (e.g., "+ACTION_VERBS.slice(0,5).join(", ")+"…).");
  else if(!/(ed|Attended)$/i.test(first) && !ACTION_VERBS.some(v=>first.toLowerCase()===v.toLowerCase())) issues.push("Consider opening with a past-tense action verb: "+ACTION_VERBS.slice(0,6).join(", ")+"…");
  if(parseFloat(hours)>3) issues.push("Block billing: entries over 3.0 hours should be split into separate, task-specific entries.");
  BANNED.forEach(b=>{ if(b.re.test(d)) issues.push(b.msg); });
  if(d.length<25) issues.push("Add detail — a reader outside your department should understand what you did and why it mattered.");
  return {issues, ok:issues.length===0};
}

const LS="ccep-portal-demo-v1";
let DB=load();
function load(){ try{const raw=localStorage.getItem(LS); if(raw) return JSON.parse(raw);}catch(e){} return seed(); }
function save(){ try{localStorage.setItem(LS,JSON.stringify(DB));}catch(e){} }
function resetDemo(){ localStorage.removeItem(LS); DB=seed(); flash("Demo data reset."); render(); }
function flash(msg){ const f=document.getElementById("flash"); f.textContent=msg; f.classList.add("show"); setTimeout(()=>f.classList.remove("show"),2600); }

let ROLE="s1"; /* current persona id */
let VIEW="dash";
let FORMCTX=null; /* {form, student, by} while filling an evaluation */
let EDITWEEK=null;
let SUPFOCUS=null; /* which extern a multi-student supervisor is currently viewing */

const PERSONAS=()=>[
 ...DB.students.map(s=>({id:s.id, label:s.name+" — Student ("+s.company+")", kind:"student"})),
 ...DB.supervisors.map(u=>({id:u.id, label:u.name+" — Field Supervisor ("+u.company+")", kind:"supervisor"})),
 {id:"admin", label:"Program Administration — Dean Yeager", kind:"admin"}
];
function personaKind(){ return PERSONAS().find(p=>p.id===ROLE).kind; }

/* ---------- Helpers ---------- */
function entriesFor(sid,week){ return DB.entries.filter(e=>e.student===sid && (week==null||e.week===week)); }
function weekStatus(sid,week){
  const es=entriesFor(sid,week);
  if(!es.length) return "missing";
  if(es.every(e=>e.status==="approved")) return "approved";
  if(es.every(e=>e.status==="approved"||e.status==="submitted")) return "submitted";
  return "draft";
}
function weekHours(sid,week){ return entriesFor(sid,week).reduce((a,e)=>a+parseFloat(e.hours||0),0); }
function totalHours(sid){ return entriesFor(sid,null).filter(e=>e.status!=="draft"?true:true).reduce((a,e)=>a+parseFloat(e.hours||0),0); }
function submittedHours(sid){ return entriesFor(sid,null).filter(e=>e.status==="submitted"||e.status==="approved").reduce((a,e)=>a+parseFloat(e.hours||0),0); }
function isPast(dateStr){ return dateStr<TODAY; }
function fmt(d){ if(!d)return ""; const [y,m,dd]=d.split("-"); return ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][+m-1]+" "+(+dd)+", "+y; }
function evalOf(form,sid){ return DB.evals.find(e=>e.form===form && e.student===sid); }
function esc(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
/* ---------- Navigation / rendering ---------- */
const NAVS={
 student:[["dash","Dashboard"],["entry","Enter Time"],["sheets","My Timesheets"],["evals","My Evaluations"],["guide","Time Categories Guide"]],
 supervisor:[["sdash","My Extern"],["ssheets","Timesheets"],["sevals","Evaluations"]],
 admin:[["adash","Cohort Dashboard"],["achart","Progress Chart"],["aevals","Evaluations"],["areports","Reports"],["adir","Company Directory"],["aroster","Fall 2026 Roster"],["aroster27","Spring 2027 Roster"]]

function go(v){ VIEW=v; FORMCTX=null; EDITWEEK=null; render(); }
function render(){
  const sel=document.getElementById("roleSel");
  sel.innerHTML=PERSONAS().map(p=>`<option value="${p.id}" ${p.id===ROLE?"selected":""}>${esc(p.label)}</option>`).join("");
  const kind=personaKind();
  document.getElementById("nav").innerHTML=NAVS[kind].map(([v,l])=>`<button class="${VIEW===v?"active":""}" onclick="go('${v}')">${l}</button>`).join("");
  const m=document.getElementById("main");
  if(FORMCTX){ m.innerHTML=renderEvalForm(FORMCTX); return; }
  const views={dash:vStudentDash,entry:vTimeEntry,sheets:vTimesheets,evals:vStudentEvals,guide:vGuide,
               sdash:vSupDash,ssheets:vSupSheets,sevals:vSupEvals,
               adash:vAdminDash,achart:vAdminChart,aevals:vAdminEvals,areports:vAdminReports,adir:vAdminDirectory,aroster:vAdminRoster,aroster27:vAdminRosterSpring27};
  m.innerHTML=(views[VIEW]||views[NAVS[kind][0][0]])();
}

  if(!midEval && MIDTERM_DUE>=TODAY) alerts+=`<div class="banner"><b>Mid-Term Self-Evaluation</b> is due ${fmt(MIDTERM_DUE)}. <a href="#" onclick="openEval('mid-student','${s.id}');return false" style="color:var(--smu-blue)">Start now &rarr;</a></div>`;

  const sups=studentSupervisors(s.id);
  const supLine=sups.map(u=>esc(u.name)+(u.title?", "+esc(u.title):"")).join("; ");

  <p class="muted" style="margin:4px 0 18px">${esc(s.company)} — ${esc(s.dept)} &middot; Field Supervisor${sups.length>1?"s":""}: ${supLine} &middot; Faculty Supervisor: ${esc(s.faculty)}</p>

  <div class="grid g3">
    <div class="card"><h3>Hours Toward 120</h3><div class="big">${hrs.toFixed(1)}<small> / ${HOURS_REQUIRED}</small></div>
      <div class="pbar"><div style="width:${pct}%"></div></div><p class="muted" style="margin-top:6px">${pct}% complete &middot; ~10 hrs/week keeps you on pace</p></div>
    <div class="card"><h3>Current Week</h3><div class="big" style="color:var(--smu-blue)">Week ${wkNow?wkNow.n:12}</div>
      <p class="muted" style="margin-top:6px">${wkNow?wkNow.label:""}<br>Timesheet due <b>${wkNow?fmt(wkNow.due):""} at 5:00 PM</b></p>
      <button class="btn" onclick="EDITWEEK=${wkNow?wkNow.n:12};go('entry')">Enter time &rarr;</button></div>
    <div class="card"><h3>Evaluations</h3>
      <p style="font-size:13.5px;line-height:2">
      Mid-Term Self-Eval — ${midEval?tag("done","Submitted"):tag("open","Due "+fmt(MIDTERM_DUE))}<br>
      Final Self-Eval — ${evalOf("final-student",s.id)?tag("done","Submitted"):tag("open","Due "+fmt(FINAL_DUE))}</p></div>
  </div>
  <div class="section"><h2>Your Work by Time Category</h2>
    <p class="muted" style="margin-bottom:12px">Faculty Supervisors review this mix to make sure you're getting a variety of assignments. If one category dominates, talk with your Field Supervisor about broadening your experience.</p>
    ${catTotals.map(x=>`<div style="display:flex;align-items:center;gap:10px;margin:7px 0;font-family:Arial;font-size:12.5px">
       <div style="width:250px">${esc(x.c.name)} (${x.c.code})</div>
       <div style="flex:1;background:var(--light);border-radius:5px;height:16px"><div style="width:${Math.round(x.h/maxCat*100)}%;background:var(--smu-blue);height:16px;border-radius:5px"></div></div>
       <div style="width:56px;text-align:right"><b>${x.h.toFixed(1)} h</b></div></div>`).join("")}

    ${es.map(e=>`<tr><td style="white-space:nowrap">${fmt(e.date)}</td><td>${(+e.hours).toFixed(2)}</td><td style="white-space:nowrap">${esc(e.category)}</td><td>${esc(e.desc)}</td><td>${tag("t"===e.status?"draft":e.status,e.status)}</td>
    <td>${e.status==="draft"?`<button class="btn-sm danger" onclick="delEntry('${e.id}')">Delete</button>`:""}</td></tr>`).join("")}</table>`:`<p class="muted" style="margin-top:12px">No entries yet for this week.</p>`}
  ${editable?`
  <div class="subrule">Add an entry</div>
  <div class="row">

    <div style="flex:2"><label class="f">Time category</label><select id="nCat" onchange="catHint()">
      <option value="">— Select —</option>${CATEGORIES.map(c=>`<option value="${c.code}">${esc(c.name)} (${c.code})</option>`).join("")}</select>
      <div id="catHint" class="muted" style="margin-top:5px;font-family:Arial;font-size:11.5px"></div></div>

  <textarea id="nDesc" placeholder="e.g., Researched Delaware LLC operating agreement requirements for multi-member LLCs" oninput="liveCoach()"></textarea>
  <div id="coachBox"></div>
  <button class="btn" onclick="addEntry(${wk})">Add entry</button>
  ${es.length?`<button class="btn blue" onclick="submitWeek(${wk})">Submit Week ${wk} timesheet to ${esc(studentSupervisors(s.id).map(u=>u.name).join(" & "))}</button>`:""}

function catHint(){
  const code=document.getElementById("nCat").value, h=document.getElementById("catHint");
  if(!code){h.innerHTML="";return;}
  const c=cat(code);
  h.innerHTML="<b>Includes:</b> "+c.activities.join(" · ")+(c.good?`<br><span style="color:var(--ok)">✓ “${esc(c.good)}”</span> &nbsp; <span style="color:var(--err)">✗ “${esc(c.bad)}”</span>`:"");
}
function liveCoach(){
  const d=document.getElementById("nDesc"), hrs=document.getElementById("nHours"), box=document.getElementById("coachBox");
  if(!d||!box) return;
  if(!d.value.trim() && !hrs.value){ box.innerHTML=""; return; }
  const r=coach(d.value,hrs.value);
  box.innerHTML=r.ok
    ?`<div class="coach good">✓ Strong time description — specific, action-led, and appropriately detailed.</div>`
    :`<div class="coach warn"><b>Writing Good Time Descriptions — suggestions:</b><ul>${r.issues.map(i=>"<li>"+i+"</li>").join("")}</ul></div>`;
}
function addEntry(wk){
  const date=document.getElementById("nDate").value, hours=document.getElementById("nHours").value,
        cate=document.getElementById("nCat").value, desc=document.getElementById("nDesc").value.trim();
  if(!date||!hours||!cate||!desc){ flash("Please complete date, hours, category, and description."); return; }
  const r=coach(desc,hours);
  if(parseFloat(hours)>3){ flash("Entries over 3.0 hours must be split into separate task entries."); return; }
  DB.entries.push({id:ROLE+"-w"+wk+"-"+Date.now(), student:ROLE, week:wk, date, hours:parseFloat(hours), category:cate, desc, status:"draft"});
  save(); flash(r.ok?"Entry added.":"Entry added — consider the writing suggestions before submitting."); render();
}
function delEntry(id){ DB.entries=DB.entries.filter(e=>e.id!==id); save(); render(); }
function submitWeek(wk){
  const es=entriesFor(ROLE,wk).filter(e=>e.status==="draft");
  const bad=es.map(e=>coach(e.desc,e.hours)).filter(r=>!r.ok).length;
  if(bad && !confirm(bad+" entr"+(bad>1?"ies have":"y has")+" writing suggestions outstanding. Submit anyway?")) return;
  es.forEach(e=>e.status="submitted"); save();
  flash("Week "+wk+" timesheet submitted — your Field Supervisor has been notified by email (simulated).");
  render();
}

/* ================= EVALUATIONS (shared renderer) ================= */
function openEval(form,sid){ FORMCTX={form,student:sid}; render(); window.scrollTo(0,0); }
function closeEval(){ FORMCTX=null; render(); }
function canViewEval(form,sid){
  const kind=personaKind(), def=FORMS[form];
  if(kind==="admin") return true;                                  /* program office sees everything */
  if(kind==="student") return def.who==="student" && sid===ROLE;   /* students: own self-evals only */
  if(kind==="supervisor") return def.who==="supervisor" && myStudents().some(s=>s.id===sid); /* supervisors: own forms about their own externs only */
  return false;
}
function renderEvalForm(ctx){
  if(!canViewEval(ctx.form,ctx.student)){
    return `<button class="btn sec" style="margin:0 0 16px" onclick="closeEval()">&larr; Back</button>
    <div class="section" style="margin-top:0"><h2>Not available</h2>
    <p style="font-size:14px">This evaluation is confidential. ${personaKind()==="student"
      ?"Field Supervisor evaluations are submitted directly to the CCEP program office and are not viewable by students."
      :"Student self-evaluations are submitted directly to the CCEP program office and are not viewable by placements."}
    Questions? Contact the program office (Dean Yeager).</p></div>`;
  }
  const def=FORMS[ctx.form], s=DB.students.find(x=>x.id===ctx.student);
  const ev=evalOf(ctx.form,ctx.student);
  const kind=personaKind();
  /* which supervisor's name appears on the form: whoever actually submitted it (ev.by), else the acting
     supervisor persona if one is currently filling it out, else the student's primary (first-listed) supervisor */
  const sup = ev ? (DB.supervisors.find(u=>u.id===ev.by) || studentSupervisors(s.id)[0])
             : (kind==="supervisor" ? DB.supervisors.find(u=>u.id===ROLE) : studentSupervisors(s.id)[0]);
  const readonly=!!ev;
  const canFill=!ev && ((def.who==="student"&&kind==="student"&&ROLE===ctx.student) || (def.who==="supervisor"&&kind==="supervisor"));
  let html=`<button class="btn sec" style="margin:0 0 16px" onclick="closeEval()">&larr; Back</button>
  <div class="section" style="margin-top:0">
    <h2>${esc(def.title)}</h2>
    <table style="max-width:640px;margin-bottom:8px"><tr><td style="border:none;padding:3px 14px 3px 0"><b>Institution:</b> Southern Methodist University</td><td style="border:none;padding:3px 0"><b>Student:</b> ${esc(s.name)}</td></tr>
    <tr><td style="border:none;padding:3px 14px 3px 0"><b>Supervisor:</b> ${esc(sup.name)}</td><td style="border:none;padding:3px 0"><b>Site:</b> ${esc(s.company)}</td></tr>
    <tr><td style="border:none;padding:3px 14px 3px 0"><b>Due:</b> ${fmt(def.due)}</td><td style="border:none;padding:3px 0"><b>Status:</b> ${ev?"Submitted "+fmt(ev.submittedAt):"Not submitted"}</td></tr></table>
    ${def.intro?`<div class="banner">${esc(def.intro)}</div>`:""}`;
  def.sections.forEach((sec,si)=>{
    /* hide confidential sections from supervisors */
    if(sec.confidential && kind==="supervisor"){ return; }
    if(sec.kind==="matrix"){
      html+=`<div class="subrule">${esc(sec.title)}${sec.weight?`<span class="wchip">Section Weight: ${sec.weight}</span>`:""}</div>
      <table class="ematrix"><tr><th></th>${sec.scale.map(o=>`<th>${o}</th>`).join("")}</tr>
      ${sec.items.map((it,ii)=>{
        const key=sec.title+"|"+it;
        const cur=ev?ev.ratings?.[key]:null;
        return `<tr><td>${esc(it)}</td>${sec.scale.map(o=>`<td><input type="radio" name="m${si}_${ii}" data-key="${esc(key)}" value="${esc(o)}" ${cur===o?"checked":""} ${readonly?"disabled":""}></td>`).join("")}</tr>`;}).join("")}
      </table>`;
    } else if(sec.kind==="comments"){
      html+=`<div class="subrule">${esc(sec.title)}${sec.confidential?` <span class="tag t-open">Confidential — hidden from your placement</span>`:""}</div>`;
      if(sec.note) html+=`<div class="confid">${esc(sec.note)}</div>`;
      sec.items.forEach(it=>{
        const cur=ev?ev.comments?.[it.id]||"":"";
        html+=`<label class="f">${esc(it.q)}</label>`;
        html+= readonly?`<div style="background:var(--light);border-radius:6px;padding:10px 13px;font-size:14px">${esc(cur)||"<span class='muted'>—</span>"}</div>`
                       :`<textarea data-cid="${it.id}" placeholder="Enter comments">${esc(cur)}</textarea>`;
      });
    } else if(sec.kind==="reviewed"){
      const cur=ev?ev.reviewed:null;
      html+=`<div class="subrule">${esc(sec.title)}</div><div class="confid" style="background:var(--hdr-bg);border-color:var(--smu-blue)">${esc(sec.note)}</div>
      <label style="font-family:Arial;font-size:13.5px;margin-right:22px"><input type="radio" name="reviewed" value="Yes" ${cur==="Yes"?"checked":""} ${readonly?"disabled":""}> Yes, I have reviewed this evaluation with the student.</label>
      <label style="font-family:Arial;font-size:13.5px"><input type="radio" name="reviewed" value="No" ${cur==="No"?"checked":""} ${readonly?"disabled":""}> No, I have not reviewed this evaluation with the student.</label>`;
    } else if(sec.kind==="signature"){
      const cur=ev?ev.signature||"":"";
      html+=`<div class="subrule">${esc(sec.title)}</div><label class="f">Signature of Field Supervisor and Date:</label>`;
      html+= readonly?`<div style="background:var(--light);border-radius:6px;padding:10px 13px;font-family:Georgia;font-style:italic;font-size:15px">${esc(cur)}</div>`
                     :`<input type="text" id="sigField" placeholder="Type your full name and today's date">`;
    }
  });
  if(canFill) html+=`<button class="btn" onclick="submitEval()">Submit Evaluation</button> <p class="locknote">Submitted evaluations are shared with the CCEP program office${def.who==="supervisor"?" and (except confidential sections) may be reviewed with the student":""}. This action cannot be undone.</p>`;
  html+=`</div>`;
  return html;
}
function submitEval(){
  const def=FORMS[FORMCTX.form];
  const ratings={}, comments={};
  let missing=0;
  document.querySelectorAll('#main input[type=radio][data-key]').forEach(r=>{ if(r.checked) ratings[r.dataset.key]=r.value; });
  def.sections.filter(x=>x.kind==="matrix").forEach((sec)=>{ sec.items.forEach(it=>{ if(!ratings[sec.title+"|"+it]) missing++; }); });
  document.querySelectorAll('#main textarea[data-cid]').forEach(t=>comments[t.dataset.cid]=t.value.trim());
  const reviewedEl=document.querySelector('#main input[name=reviewed]:checked');
  const sig=document.getElementById("sigField");
  if(missing){ if(!confirm(missing+" rating(s) are blank. Submit anyway?")) return; }
  if(sig && !sig.value.trim()){ flash("Please sign the evaluation before submitting."); return; }
  DB.evals.push({id:"e"+Date.now(), form:FORMCTX.form, student:FORMCTX.student,
    by: personaKind()==="supervisor"?ROLE:FORMCTX.student, status:"submitted", submittedAt:TODAY,
    ratings, comments, reviewed:reviewedEl?reviewedEl.value:null, signature:sig?sig.value.trim():null});
  save(); flash("Evaluation submitted. The program office has been notified (simulated email)."); FORMCTX=null; render(); window.scrollTo(0,0);
}

function myStudents(){ return DB.students.filter(s=>(s.supervisors||[]).includes(ROLE)); }
function myStudent(){
  const list=myStudents();
  if(!list.length) return null;
  if(SUPFOCUS && list.some(s=>s.id===SUPFOCUS)) return list.find(s=>s.id===SUPFOCUS);
  return list[0]; /* default to first extern until the supervisor picks one */

function supSwitcher(){
  const list=myStudents();

}

function approveWeek(sid,wk){ entriesFor(sid,wk).forEach(e=>{if(e.status==="submitted")e.status="approved";}); save(); flash("Week "+wk+" confirmed — the student and program office have been notified (simulated)."); render(); }
function returnWeek(sid,wk){
  const note=prompt("Add a note for the student (what needs to change?):"); if(note===null) return;
  entriesFor(sid,wk).forEach(e=>{if(e.status==="submitted")e.status="draft";});
  DB.returns=DB.returns||{}; DB.returns[sid+"-"+wk]=note; save();

function sendReminders(){

  DB.students.forEach(s=>{ n+=WEEKS.filter(w=>isPast(w.due)&&weekStatus(s.id,w.n)==="missing").length; });

function missedItems(sid){
  /* timesheets past due with nothing submitted, or still sitting in draft */
  const ts=WEEKS.filter(w=>isPast(w.due)&&(weekStatus(sid,w.n)==="missing"||weekStatus(sid,w.n)==="draft"))
    .map(w=>({kind:"Timesheet", label:"Week "+w.n+" timesheet", due:w.due, status:weekStatus(sid,w.n)==="draft"?"draft never submitted":"never started"}));
  const evs=[["mid-student","Mid-Term self-evaluation (student)"],["mid-super","Mid-Term evaluation (Field Supervisor)"],
             ["final-student","Final self-evaluation (student)"],["final-super","Final evaluation (Field Supervisor)"]]
    .filter(([k])=>FORMS[k].due<TODAY && !evalOf(k,sid))
    .map(([k,label])=>({kind:"Evaluation", label, due:FORMS[k].due, status:"overdue"}));
  return [...ts,...evs];
}
function dueSoon(sid){
  const soon=(d)=>{const t=new Date(TODAY), x=new Date(d); return (x-t)/86400000>=0 && (x-t)/86400000<=7;};

    .filter(([k])=>soon(FORMS[k].due)&&!evalOf(k,sid)).map(([,l],i,arr)=>l+" due");
  return [...ts,...evs];
}

        <div title="Expected pace: ${pace} hrs" style="position:absolute;left:${pacePct}%;top:-4px;height:28px;width:3px;background:var(--smu-blue);border-radius:2px"></div>
      </div>
      ${r.missed.length?`<div style="font-family:Arial;font-size:12px;color:var(--err);margin-top:5px"><b>Missed:</b> ${r.missed.map(m=>esc(m.label)+" (due "+fmt(m.due)+", "+m.status+")").join(" · ")}</div>`
        :`<div style="font-family:Arial;font-size:12px;color:var(--ok);margin-top:5px">Nothing missed</div>`}
      ${r.soon.length?`<div style="font-family:Arial;font-size:12px;color:#8a6d00;margin-top:2px"><b>Due within 7 days:</b> ${r.soon.map(esc).join(" · ")}</div>`:""}
    </div>`;}).join("")}
  <div class="legend"><span style="display:inline-block;width:14px;height:14px;background:var(--ok);border-radius:3px;vertical-align:middle"></span> On pace
   &nbsp;<span style="display:inline-block;width:14px;height:14px;background:#C77B00;border-radius:3px;vertical-align:middle"></span> Slightly behind (&lt;10 hrs)
   &nbsp;<span style="display:inline-block;width:14px;height:14px;background:var(--err);border-radius:3px;vertical-align:middle"></span> Behind pace (&ge;10 hrs)
   &nbsp;<span style="display:inline-block;width:3px;height:14px;background:var(--smu-blue);vertical-align:middle"></span> Expected hours today</div>
  <button class="btn" onclick="exportCSV('hours')">Export this as CSV</button></div>`;
}
function vAdminEvals(){
  return `<div class="section" style="margin-top:0"><h2>Evaluation Tracking</h2>
  <table><tr><th>Student</th><th>Mid — Student</th><th>Mid — Field Sup.</th><th>Final — Student</th><th>Final — Field Sup.</th></tr>
  ${DB.students.map(s=>`<tr><td><b>${esc(s.name)}</b><br><span class="muted">${esc(s.company)}</span></td>
   ${["mid-student","mid-super","final-student","final-super"].map(k=>{
     const ev=evalOf(k,s.id);
     return `<td>${ev?tag("done","Received "+fmt(ev.submittedAt))+` <button class="btn-sm" onclick="openEval('${k}','${s.id}')">Open</button>`:(FORMS[k].due<TODAY?tag("overdue","Overdue"):tag("open","Pending"))}</td>`;}).join("")}
  </tr>`).join("")}
  </table>
  <p class="muted" style="margin-top:12px">Program administration can read all evaluations, including confidential student comments about Field Supervisors. Confidential sections are never visible to placements.</p></div>`;
}
function vAdminReports(){
  return `<div class="section" style="margin-top:0"><h2>Reports &amp; Exports</h2>
  <p style="font-size:14px">Download program data for ABA experiential learning documentation, registrar reporting, or Faculty Supervisor breakout preparation.</p>
  <button class="btn" onclick="exportCSV('hours')">Export hours summary (CSV)</button>
  <button class="btn blue" onclick="exportCSV('entries')">Export all time entries (CSV)</button>
  <button class="btn sec" onclick="window.print()">Print current view</button>
  <div class="subrule">Category mix across cohort</div>
  ${CATEGORIES.map(c=>{
    const h=DB.entries.filter(e=>e.category===c.code&&e.status!=="draft").reduce((a,e)=>a+ +e.hours,0);
    const tot=DB.entries.filter(e=>e.status!=="draft").reduce((a,e)=>a+ +e.hours,0);
    return `<div style="display:flex;align-items:center;gap:10px;margin:6px 0;font-family:Arial;font-size:12.5px">
    <div style="width:260px">${esc(c.name)} (${c.code})</div>
    <div style="flex:1;background:var(--light);border-radius:5px;height:15px"><div style="width:${tot?Math.round(h/tot*100):0}%;background:var(--smu-red);height:15px;border-radius:5px"></div></div>
    <div style="width:90px;text-align:right"><b>${h.toFixed(1)} h</b> (${tot?Math.round(h/tot*100):0}%)</div></div>`;}).join("")}
  </div>`;
}
function vAdminDirectory(){
  const sups=DIRECTORY.supervisors, sites=DIRECTORY.sites;
  return `<div class="section" style="margin-top:0"><h2>Company &amp; Field Supervisor Directory</h2>
  <p style="font-size:14px">Master list of CCEP placement sites and field supervisor contacts, imported from the CORE ELMS export (cleaned 7/9/26 — test/duplicate rows removed). ${sups.length} supervisor contacts across ${sites.length} sites. This directory does not itself create student placements — import the semester roster (student, email, company, field supervisor email) separately to match students to these contacts.</p>
  <input id="dirSearch" type="text" placeholder="Search by name, company, or email…" oninput="filterDirectory()" style="width:100%;max-width:420px;padding:8px 10px;border:1px solid #ccc;border-radius:6px;font-family:Arial;font-size:13px;margin-bottom:10px">
  <button class="btn sec" onclick="exportCSV('directory')">Export directory (CSV)</button>
  <div class="subrule">Field Supervisors (<span id="dirCount">${sups.length}</span> shown)</div>
  <div style="max-height:520px;overflow:auto;border:1px solid var(--light);border-radius:6px">
  <table style="width:100%;border-collapse:collapse;font-family:Arial;font-size:12.5px">
  <thead style="position:sticky;top:0;background:#fff"><tr style="text-align:left;border-bottom:2px solid var(--light)">
  <th style="padding:6px 8px">Name</th><th style="padding:6px 8px">Title</th><th style="padding:6px 8px">Company</th><th style="padding:6px 8px">Email</th><th style="padding:6px 8px">Location</th></tr></thead>
  <tbody id="dirBody">
  ${sups.map(s=>{
    const key=[s.name,s.title,s.company,s.email].filter(Boolean).join(" ").toLowerCase();
    return `<tr data-k="${esc(key)}" style="border-bottom:1px solid var(--light)">
    <td style="padding:5px 8px"><b>${esc(s.name||"—")}</b></td>
    <td style="padding:5px 8px">${esc(s.title||"—")}</td>
    <td style="padding:5px 8px">${esc(s.company||"—")}</td>
    <td style="padding:5px 8px">${s.email?`<a href="mailto:${esc(s.email)}">${esc(s.email)}</a>`:"—"}</td>
    <td style="padding:5px 8px">${esc([s.city,s.state].filter(Boolean).join(", ")||"—")}</td></tr>`;}).join("")}
  </tbody></table></div>
  <div class="subrule">Sites without a listed individual contact (${sites.length})</div>
  <div style="max-height:260px;overflow:auto;border:1px solid var(--light);border-radius:6px">
  <table style="width:100%;border-collapse:collapse;font-family:Arial;font-size:12.5px">
  <thead style="position:sticky;top:0;background:#fff"><tr style="text-align:left;border-bottom:2px solid var(--light)">
  <th style="padding:6px 8px">Company</th><th style="padding:6px 8px">Address</th><th style="padding:6px 8px">City</th><th style="padding:6px 8px">State</th></tr></thead>
  <tbody>
  ${sites.map(s=>`<tr style="border-bottom:1px solid var(--light)">
    <td style="padding:5px 8px"><b>${esc(s.company||"—")}</b></td>
    <td style="padding:5px 8px">${esc(s.address||"—")}</td>
    <td style="padding:5px 8px">${esc(s.city||"—")}</td>
    <td style="padding:5px 8px">${esc(s.state||"—")}</td></tr>`).join("")}
  </tbody></table></div>
  </div>`;
}
function filterDirectory(){
  const q=(document.getElementById("dirSearch").value||"").toLowerCase().trim();
  const rows=document.querySelectorAll("#dirBody tr");
  let n=0;
  rows.forEach(r=>{ const show=!q||r.getAttribute("data-k").includes(q); r.style.display=show?"":"none"; if(show)n++; });
  document.getElementById("dirCount").textContent=n;
}
function vAdminRoster(){
  const all=PARTICIPANTS2026;
  const placed=all.filter(p=>p.placed).length, unplaced=all.length-placed;
  return `<div class="section" style="margin-top:0"><h2>Fall 2026 Roster</h2>
  <p style="font-size:14px">${all.length} students enrolled in Fall 2026 CCEP. <span style="color:#1a7a3a;font-weight:bold">${placed} placed</span> &nbsp;·&nbsp; <span style="color:var(--smu-red);font-weight:bold">${unplaced} not yet placed</span>. Placement is matched by field-supervisor email against the Company Directory; imported 7/9/26.</p>
  <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:10px">
  <input id="rosterSearch" type="text" placeholder="Search by student, company, or supervisor…" oninput="filterRoster()" style="flex:1;min-width:220px;max-width:420px;padding:8px 10px;border:1px solid #ccc;border-radius:6px;font-family:Arial;font-size:13px">
  <label style="font-family:Arial;font-size:13px;display:flex;align-items:center;gap:5px"><input type="checkbox" id="rosterUnplacedOnly" onchange="filterRoster()"> Not yet placed only</label>
  <button class="btn sec" onclick="exportCSV('roster')">Export roster (CSV)</button>
  </div>
  <div class="subrule">Students (<span id="rosterCount">${all.length}</span> shown)</div>
  <div style="max-height:560px;overflow:auto;border:1px solid var(--light);border-radius:6px">
  <table style="width:100%;border-collapse:collapse;font-family:Arial;font-size:12.5px">
  <thead style="position:sticky;top:0;background:#fff"><tr style="text-align:left;border-bottom:2px solid var(--light)">
  <th style="padding:6px 8px">Student</th><th style="padding:6px 8px">Email</th><th style="padding:6px 8px">Status</th>
  <th style="padding:6px 8px">Company</th><th style="padding:6px 8px">Field Supervisor</th><th style="padding:6px 8px">Supervisor Email</th></tr></thead>
  <tbody id="rosterBody">
  ${all.map(p=>{
    const key=[p.fullName,p.email,p.company,p.supervisorFirst,p.supervisorLast,p.supervisorEmail].filter(Boolean).join(" ").toLowerCase();
    return `<tr data-k="${esc(key)}" data-placed="${p.placed?1:0}" style="border-bottom:1px solid var(--light)">
    <td style="padding:5px 8px"><b>${esc(p.fullName)}</b></td>
    <td style="padding:5px 8px">${esc(p.email||"—")}</td>
    <td style="padding:5px 8px">${p.placed?`<span class="tag" style="background:#e3f5ea;color:#1a7a3a">Placed</span>`:`<span class="tag" style="background:#fbe4e4;color:var(--smu-red)">Not placed</span>`}</td>
    <td style="padding:5px 8px">${esc(p.company||"—")}</td>
    <td style="padding:5px 8px">${p.placed?esc((p.supervisorFirst||"")+" "+(p.supervisorLast||"")):"—"}${p.coSupervisorFirst?`<br><span class="muted" style="font-size:11px">Co-supervisor: ${esc(p.coSupervisorFirst+" "+p.coSupervisorLast)}</span>`:""}</td>
    <td style="padding:5px 8px">${p.supervisorEmail?`<a href="mailto:${esc(p.supervisorEmail)}">${esc(p.supervisorEmail)}</a>`:"—"}${p.coSupervisorEmail?`<br><a href="mailto:${esc(p.coSupervisorEmail)}" style="font-size:11px">${esc(p.coSupervisorEmail)}</a>`:""}</td></tr>`;}).join("")}
  </tbody></table></div>
  <p class="muted" style="font-size:12px;margin-top:10px">Note: this roster is reference data for Program Admin — it is separate from the demo timesheet cohort (Jordan/Priya/Marcus) shown elsewhere in this prototype, which uses sample data to illustrate the time-entry and evaluation workflow.</p>
  </div>`;
}
function filterRoster(){
  const q=(document.getElementById("rosterSearch").value||"").toLowerCase().trim();
  const unplacedOnly=document.getElementById("rosterUnplacedOnly").checked;
  const rows=document.querySelectorAll("#rosterBody tr");
  let n=0;
  rows.forEach(r=>{
    const matchesQ=!q||r.getAttribute("data-k").includes(q);
    const matchesPlaced=!unplacedOnly||r.getAttribute("data-placed")==="0";
    const show=matchesQ&&matchesPlaced;
    r.style.display=show?"":"none"; if(show)n++;
  });
  document.getElementById("rosterCount").textContent=n;
}
function vAdminRosterSpring27(){
  const rows=PARTICIPANTS_SPRING2027;
  return `<div class="section" style="margin-top:0"><h2>Spring 2027 Roster</h2>
  <p style="font-size:14px">Early placements confirmed for the Spring 2027 term, tracked separately from the Fall 2026 cohort above. ${rows.length} student${rows.length===1?"":"s"} placed so far.</p>
  <table><tr><th>Student</th><th>Email</th><th>Company</th><th>Field Supervisor</th><th>Term</th></tr>

    <td>${p.supervisorFirst?esc(p.supervisorFirst+" "+p.supervisorLast):"—"}${p.coSupervisorFirst?`<br><span class="muted" style="font-size:11px">Co-supervisor: ${esc(p.coSupervisorFirst+" "+p.coSupervisorLast)}</span>`:""}</td>
    <td>${esc(p.term)}</td></tr>`).join("")}
  </table>
  <p class="muted" style="font-size:12px;margin-top:10px">Field supervisor contacts for these placements have not been confirmed yet — add them here once known, and they'll also need adding to the Company Directory if the contact is new.</p>
  </div>`;
}
function exportCSV(kind){
  let csv,fn;
  if(kind==="roster"){
    csv="Student Name,Student Email,Status,Company,Field Supervisor,Supervisor Email\n"+
    PARTICIPANTS2026.map(p=>[p.fullName,p.email,p.placed?"Placed":"Not placed",p.company,(p.supervisorFirst||"")+" "+(p.supervisorLast||""),p.supervisorEmail].map(v=>'"'+String(v==null?"":v).replace(/"/g,'""')+'"').join(",")).join("\n");
    fn="CCEP-fall2026-roster.csv";
  } else if(kind==="directory"){
    csv="Name,Title,Company,Email,City,State\n"+
    DIRECTORY.supervisors.map(s=>[s.name,s.title,s.company,s.email,s.city,s.state].map(v=>'"'+String(v||"").replace(/"/g,'""')+'"').join(",")).join("\n");
    fn="CCEP-supervisor-directory.csv";
  } else if(kind==="hours"){
    csv="Student,Program,Company,Field Supervisor(s),Hours Submitted/Confirmed,Percent of 120,Weeks Missing,Mid Student Eval,Mid Supervisor Eval,Final Student Eval,Final Supervisor Eval\n"+
    DB.students.map(s=>{const sups=studentSupervisors(s.id);const hrs=submittedHours(s.id);
     const miss=WEEKS.filter(w=>isPast(w.due)&&weekStatus(s.id,w.n)==="missing").map(w=>"W"+w.n).join(" ");
     return [s.name,s.program,s.company,sups.map(u=>u.name).join("; "),hrs.toFixed(2),Math.round(hrs/HOURS_REQUIRED*100)+"%",miss||"none",
      ...["mid-student","mid-super","final-student","final-super"].map(k=>evalOf(k,s.id)?"Received":"Pending")].map(v=>'"'+v+'"').join(",");}).join("\n");
    fn="CCEP-hours-summary.csv";
  } else {
    csv="Student,Company,Week,Date,Hours,Category,Description,Status\n"+
    DB.entries.map(e=>{const s=DB.students.find(x=>x.id===e.student);
     return [s.name,s.company,e.week,e.date,e.hours,catLabel(e.category),e.desc,e.status].map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(",");}).join("\n");
    fn="CCEP-time-entries.csv";
  }
  const a=document.createElement("a");
  a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv); a.download=fn; a.click();
  flash("Export downloaded: "+fn);
}

/* ---------- Boot ---------- */
render();
</script>
